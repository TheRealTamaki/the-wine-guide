<svg xmlns="http://www.w3.org/2000/svg" width="4in" height="5in" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">The Wine Guide editorial wine label</title>
  <desc id="desc">A fun editorial wine bottle label for The Wine Guide.</desc>
  <rect width="1200" height="1500" fill="#f4efe6"/>
  <rect x="0" y="0" width="1200" height="246" fill="#1f1f1f"/>
  <rect x="0" y="1254" width="1200" height="246" fill="#570013"/>
  <rect x="78" y="78" width="1044" height="1344" fill="none" stroke="#1f1f1f" stroke-width="6"/>

  <text x="104" y="164" font-family="JetBrains Mono, Consolas, monospace" font-size="32" font-weight="800" fill="#f4efe6" letter-spacing="3">THE WINE GUIDE</text>
  <text x="1096" y="164" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="700" fill="#f4efe6" text-anchor="end" letter-spacing="2">ISSUE 01</text>

  <g transform="translate(104 340)">
    <text x="0" y="0" font-family="Playfair Display, Georgia, serif" font-size="142" font-weight="800" fill="#1f1f1f">Panic</text>
    <text x="0" y="132" font-family="Playfair Display, Georgia, serif" font-size="142" font-weight="800" fill="#570013">Bottle</text>
    <text x="6" y="216" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1f1f1f" letter-spacing="2">FOR WHEN SOMEONE SAYS BRING WINE</text>
  </g>

  <g transform="translate(826 632)">
    <circle cx="0" cy="0" r="170" fill="#8a4a2f"/>
    <circle cx="0" cy="0" r="126" fill="#f4efe6"/>
    <path d="M-54 -68h108v202h-108z" fill="#1f1f1f"/>
    <path d="M-102 -40c62 35 142 35 204 0v52c-62 36-142 36-204 0z" fill="#570013"/>
    <circle cx="0" cy="-8" r="34" fill="#f4efe6"/>
  </g>

  <rect x="104" y="905" width="992" height="5" fill="#1f1f1f"/>
  <text x="104" y="994" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800" fill="#1f1f1f">Tastes like you had a plan.</text>
  <text x="104" y="1060" font-family="Inter, Arial, sans-serif" font-size="31" fill="#3a3530">Bright fruit, dinner-table charm, zero bottle-shop panic.</text>
  <rect x="104" y="1128" width="320" height="84" fill="#1f1f1f"/>
  <text x="264" y="1184" font-family="JetBrains Mono, Consolas, monospace" font-size="27" font-weight="800" fill="#f4efe6" text-anchor="middle">DRINK TONIGHT</text>

  <text x="104" y="1366" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="800" fill="#f4efe6" letter-spacing="2">750 ML</text>
  <text x="1096" y="1366" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="800" fill="#f4efe6" text-anchor="end" letter-spacing="2">wineguide.co</text>
</svg>
