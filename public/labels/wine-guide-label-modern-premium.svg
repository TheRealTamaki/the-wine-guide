    <text x="600" y="1150" font-size="23" letter-spacing="2">BRIGHT FRUIT | SOFT SPICE | EASY CONFIDENCE</text>
    <text x="600" y="1232" font-size="24">750 ml | 13.5% alc/vol</text>
  </g>
  <text x="600" y="1322" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#570013">wineguide.co</text>
