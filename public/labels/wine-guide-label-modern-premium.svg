<svg xmlns="http://www.w3.org/2000/svg" width="4in" height="5in" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">The Wine Guide premium modern label</title>
  <desc id="desc">A refined modern wine bottle label for The Wine Guide.</desc>
  <rect width="1200" height="1500" fill="#1f1f1f"/>
  <rect x="82" y="82" width="1036" height="1336" fill="#f4efe6"/>
  <rect x="130" y="130" width="940" height="1240" fill="none" stroke="#570013" stroke-width="5"/>
  <rect x="158" y="158" width="884" height="1184" fill="none" stroke="#8a4a2f" stroke-width="2"/>

  <text x="600" y="246" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="#1f1f1f" letter-spacing="8">THE WINE GUIDE</text>
  <text x="600" y="320" font-family="JetBrains Mono, Consolas, monospace" font-size="21" text-anchor="middle" fill="#584141" letter-spacing="4">PRIVATE TABLE SELECTION</text>

  <g transform="translate(600 514)">
    <circle cx="0" cy="0" r="132" fill="#570013"/>
    <circle cx="0" cy="0" r="102" fill="#f4efe6"/>
    <path d="M-42 -72h84v210h-84z" fill="#570013"/>
    <path d="M-86 -30c54 28 118 28 172 0v42c-54 28-118 28-172 0z" fill="#8a4a2f"/>
    <circle cx="0" cy="-6" r="26" fill="#f4efe6"/>
  </g>

  <text x="600" y="820" font-family="Playfair Display, Georgia, serif" font-size="112" font-weight="700" text-anchor="middle" fill="#570013">Dinner Key</text>
  <text x="600" y="900" font-family="Inter, Arial, sans-serif" font-size="32" text-anchor="middle" fill="#1f1f1f">For the bottle that unlocks the table.</text>

  <rect x="240" y="988" width="720" height="3" fill="#8a4a2f"/>
  <g font-family="Inter, Arial, sans-serif" fill="#1f1f1f" text-anchor="middle">
